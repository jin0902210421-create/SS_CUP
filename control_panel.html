<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>大会運営コントロールパネル</title>
    <style>
        body { background-color: #202020; color: #fff; font-family: sans-serif; margin: 10px; font-size: 14px; }
        .area-title { font-weight: bold; color: #ff007f; border-bottom: 2px solid #ff007f; padding-bottom: 5px; margin-bottom: 15px; font-size: 14px; }
        .team-setup { display: flex; justify-content: space-between; gap: 15px; }
        .team-box { flex: 1; background-color: #2d2d2d; padding: 15px; border-radius: 8px; border: 1px solid #444; }
        .team-box.alpha { border-left: 6px solid #24b200; }
        .team-box.bravo { border-left: 6px solid #ff7c00; }
        label { display: block; margin-bottom: 6px; font-size: 13px; color: #aaa; font-weight: bold; }
        select, button { width: 100%; padding: 10px; background-color: #1a1a1a; color: #fff; border: 1px solid #555; border-radius: 4px; box-sizing: border-box; margin-bottom: 12px; font-weight: bold; font-size: 14px; }
        .score-control { display: flex; align-items: center; gap: 10px; }
        .score-btn { background-color: #444; cursor: pointer; font-size: 18px; margin-bottom: 0; }
        .score-display { text-align: center; font-size: 24px; font-weight: bold; width: 50px; background: #111; border-radius: 6px; padding: 6px 0; }
        .status-text { font-size: 11px; color: #00ffcc; text-align: center; margin-top: 5px; }
    </style>
</head>
<body>
<div class="container">
    <div class="area-title">🏆 スプラ3 大会運営コントロールパネル (Sheet連動版)</div>
    <div class="team-setup">
        <div class="team-box alpha"><label>左チーム（緑）</label><select id="leftTeamSelect" onchange="update()"></select><div class="score-control"><button class="score-btn" onclick="change('left', -1)">-</button><div class="score-display" id="leftScore">0</div><button class="score-btn" onclick="change('left', 1)">+</button></div></div>
        <div class="team-box bravo"><label>右チーム（ピンク）</label><select id="rightTeamSelect" onchange="update()"></select><div class="score-control"><button class="score-btn" onclick="change('right', -1)">-</button><div class="score-display" id="rightScore">0</div><button class="score-btn" onclick="change('right', 1)">+</button></div></div>
    </div>
    <div class="status-text" id="loadStatus">スプレッドシート同期中...</div>
</div>
<script>
    // =========================================================================
    // 🔗 【設定箇所】ご自身のGoogleスプレッドシートIDをここに貼り付けてください
    // =========================================================================
    const SPREADSHEET_ID = 'YOUR_SPREADSHEET_ID_HERE';
    // =========================================================================

    let tournamentData = {};

    // 起動時にGoogleスプレッドシートから名簿を自動取得するCSVフェッチ処理
    async function loadSpreadsheetData() {
        const url = `https://google.com{SPREADSHEET_ID}/export?format=csv&gid=0`;
        try {
            const response = await fetch(url);
            const text = await response.text();
            
            // CSVを解析してデータオブジェクトを自動組み立て
            const lines = text.split('\n');
            tournamentData = {};
            
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i]) continue;
                // カンマ区切りを配列化（トリム処理付き）
                const cells = lines[i].split(',').map(c => c.trim().replace(/^"|"$/g, ''));
                if (cells[0]) {
                    tournamentData["team_" + i] = {
                        name: cells[0],
                        members: [cells[1] || "", cells[2] || "", cells[3] || "", cells[4] || ""]
                    };
                }
            }

            // 左右のプルダウンの選択肢を全自動で生成
            ['leftTeamSelect', 'rightTeamSelect'].forEach(id => {
                let h = '<option value="none">-- 選択してください --</option>';
                for(let k in tournamentData) h += `<option value="${k}">${tournamentData[k].name}</option>`;
                document.getElementById(id).innerHTML = h;
            });
            document.getElementById('loadStatus').innerText = "🟢 スプレッドシート名簿と正常に同期しました";
            document.getElementById('loadStatus').style.color = "#00ffcc";
        } catch (e) {
            document.getElementById('loadStatus').innerText = "❌ 名簿の同期に失敗しました（共有設定を確認してください）";
            document.getElementById('loadStatus').style.color = "#ff3c12";
        }
    }

    window.addEventListener('DOMContentLoaded', loadSpreadsheetData);

    function change(side, amt) {
        let el = document.getElementById(`${side}Score`);
        el.innerText = Math.max(0, Math.min(2, parseInt(el.innerText) + amt));
        update();
    }

    const bc = new BroadcastChannel('splatoon3_tournament_sync');
    function update() {
        const lv = document.getElementById('leftTeamSelect').value;
        const rv = document.getElementById('rightTeamSelect').value;
        bc.postMessage({
            L_Name: lv !== "none" ? tournamentData[lv].name : "対戦チームA",
            L_M: lv !== "none" ? tournamentData[lv].members : ["選手A1","選手A2","選手A3","選手A4"],
            R_Name: rv !== "none" ? tournamentData[rv].name : "対戦チームB",
            R_M: rv !== "none" ? tournamentData[rv].members : ["選手B1","選手B2","選手B3","選手B4"],
            L_S: parseInt(document.getElementById('leftScore').innerText),
            R_S: parseInt(document.getElementById('rightScore').innerText)
        });
    }
</script>
</body>
</html>
