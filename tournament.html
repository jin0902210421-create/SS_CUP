<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ダブルエリミネーション トーナメント表</title>
    <style>
        @import url('https://googleapis.com');
        
        body {
            margin: 0; padding: 0;
            width: 1920px; height: 1080px;
            box-sizing: border-box;
            background-color: #121317;
            color: #fff;
            font-family: 'Noto Sans JP', sans-serif;
            overflow: hidden;
            position: relative;
        }

        .tournament-title {
            position: absolute;
            top: 40px; left: 0; width: 1920px;
            text-align: center; font-size: 38px;
            color: #fff; text-shadow: 0 0 10px rgba(0,255,204,0.3);
            font-weight: bold;
        }
        
        /* 📦 対戦カード（ボックス）のデザイン */
        .match-card {
            position: absolute;
            width: 220px;
            background: #1f2226;
            border: 2px solid #3a3f4d;
            border-radius: 8px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.7);
            z-index: 10;
            transition: all 0.3s;
        }
        .match-num {
            position: absolute;
            top: -12px; left: 50%; transform: translateX(-50%);
            background: #3a3f4d; color: #fff;
            font-size: 12px; padding: 1px 8px;
            border-radius: 10px; border: 1px solid #555;
            font-weight: bold;
        }
        
        /* 勝敗確定時の枠発光 */
        .match-card.w-win-active { border-color: #24e000; box-shadow: 0 0 15px rgba(36,224,0,0.4); }
        .match-card.l-win-active { border-color: #ff007f; box-shadow: 0 0 15px rgba(255,0,127,0.4); }
        
        .slot {
            padding: 10px; font-size: 15px; text-align: center;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            border-bottom: 1px solid #282b35; color: #eee; font-weight: bold;
            transition: all 0.3s; display: flex; justify-content: center; align-items: center; gap: 8px;
        }
        .slot:last-child { border-bottom: none; border-radius: 0 0 6px 6px; }
        .slot.is-winner { background: rgba(255,255,255,0.05); }
        .left-winner { text-shadow: 0 0 8px #24e000; color: #24e000 !important; }
        .right-winner { text-shadow: 0 0 8px #ff007f; color: #ff007f !important; }
        
        /* 🔴 敗者バッジ */
        .lose-badge { background: #555; color: #fff; font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
        .lose-badge.active { background: #ff3c12; }

        /* 🔴 接続線の太さとネオンデザイン（10px） */
        .road-line { position: absolute; background-color: #23262f; z-index: 1; transition: all 0.3s; border-radius: 4px; }
        .road-line.w-run { background-color: #24e000; box-shadow: 0 0 15px #24e000, 0 0 5px #24e000; z-index: 2; }
        .road-line.l-run { background-color: #ff007f; box-shadow: 0 0 15px #ff007f, 0 0 5px #ff007f; z-index: 2; }
        
        /* 📍 各枠の絶対座標固定（下段・中段） */
        #box_M1 { top: 820px; left: 160px; } 
        #box_M2 { top: 820px; left: 560px; } 
        #box_M3 { top: 580px; left: 360px; } 
        #box_M4 { top: 820px; left: 1160px; }
        #box_M5 { top: 580px; left: 1360px; }
        #box_M6 { top: 340px; left: 860px; } 
        
        /* 📍 最上段グランドファイナルエリア（初期状態はどちらも画面から完全に非表示） */
        #box_M7 { top: 140px; left: 860px; display: none; transition: left 0.3s ease; }  /* ⑥ 総合決勝枠 */
        #box_M7_Reset { top: 140px; left: 1120px; display: none; }                      /* ⑦ リセット戦枠 */
    </style>
</head>
<body>
    <div class="tournament-title">第3回 SS杯 ダブルエリミネーション</div>
    
    <!-- 🎮 各枠のHTML要素 -->
    <div class="match-card" id="box_M1"><div class="match-num">①</div><div class="slot" id="M1_1">Loading...</div><div class="slot" id="M1_2">Loading...</div></div>
    <div class="match-card" id="box_M2"><div class="match-num">②</div><div class="slot" id="M2_1">Loading...</div><div class="slot" id="M2_2">Loading...</div></div>
    <div class="match-card" id="box_M3"><div class="match-num">③</div><div class="slot" id="M3_1">？</div><div class="slot" id="M3_2">？</div></div>
    <div class="match-card" id="box_M4"><div class="match-num">④</div><div class="slot" id="M4_1">？</div><div class="slot" id="M4_2">？</div></div>
    <div class="match-card" id="box_M5"><div class="match-num">⑤</div><div class="slot" id="M5_1">？</div><div class="slot" id="M5_2">？</div></div>
    <div class="match-card" id="box_M6"><div class="match-num">⑥</div><div class="slot" id="M6_1">？</div><div class="slot" id="M6_2">？</div></div>
    <div class="match-card" id="box_M7"><div class="match-num">⑥</div><div class="slot" id="M7_1">？ (W)</div><div class="slot" id="M7_2">？ (L)</div></div>
    <div class="match-card" id="box_M7_Reset"><div class="match-num">⑦</div><div class="slot" id="M7R_1">？</div><div class="slot" id="M7R_2">？</div></div>

    <!-- 🔴 各ルートをつなぐ接続線 -->
    <div class="road-line" id="line_M1_L" style="top: 700px; left: 265px; width: 10px; height: 124px;"></div>
    <div class="road-line" id="line_M1_H" style="top: 700px; left: 265px; width: 200px; height: 10px;"></div>
    <div class="road-line" id="line_M2_L" style="top: 700px; left: 665px; width: 10px; height: 124px;"></div>
    <div class="road-line" id="line_M2_H" style="top: 700px; left: 465px; width: 210px; height: 10px;"></div>
    <div class="road-line" id="line_M3_Go" style="top: 658px; left: 465px; width: 10px; height: 46px;"></div>
    <div class="road-line" id="line_M3_Up" style="top: 460px; left: 465px; width: 10px; height: 124px;"></div>
    <div class="road-line" id="line_M3_ToM6" style="top: 460px; left: 465px; width: 440px; height: 10px;"></div>
    <div class="road-line" id="line_M4_Up" style="top: 700px; left: 1265px; width: 10px; height: 124px;"></div>
    <div class="road-line" id="line_M4_ToM5" style="top: 700px; left: 1265px; width: 200px; height: 10px;"></div>
    <div class="road-line" id="line_M5_Go" style="top: 658px; left: 1465px; width: 10px; height: 46px;"></div>
    <div class="road-line" id="line_M5_Up" style="top: 460px; left: 1465px; width: 10px; height: 124px;"></div>
    <div class="road-line" id="line_M5_ToM6" style="top: 460px; left: 1035px; width: 440px; height: 10px;"></div>
    <div class="road-line" id="line_M6_Up" style="top: 218px; left: 965px; width: 10px; height: 126px;"></div>
<script>
    const SPREADSHEET_ID = '1-rTsNU4FdeSF1qc3gZinJzRK8jJTXIRKQKKEOicokHA';
    let tState = {
        M1: { w: null, t1: "Loading...", t2: "Loading..." }, M2: { w: null, t1: "Loading...", t2: "Loading..." },
        M3: { w: null, t1: "？", t2: "？" }, M4: { w: null, t1: "？ (①敗者)", t2: "？ (②敗者)" },
        M5: { w: null, t1: "？", t2: "？ (③敗者)" }, M6: { w: null, t1: "？ (③勝者)", t2: "？ (⑤勝者)" }, 
        M7: { w: null, t1: "？ (W)", t2: "？ (L)" }, M7_Reset: { w: null, t1: "？", t2: "？" }
    };

    // スプレッドシート名簿の自動初期ロード（CORS回避対応・完全版）
    async function initTournament() {
        try {
            const res = await fetch(`https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=0`);
            const text = await res.text(); 
            const lines = text.split('\n'); 
            let teams = [];
            
            for(let i = 1; i <= 4; i++) {
                if(lines[i]) { 
                    const cells = lines[i].split(',');
                    const name = cells[0].trim().replace(/^"|"$/g, '');
                    teams.push(name || `チーム${i}`); 
                } else { teams.push(`チーム${i}`); }
            }
            tState.M1.t1 = teams[0]; tState.M1.t2 = teams[1];
            tState.M2.t1 = teams[2]; tState.M2.t2 = teams[3];
            refreshDOM();
        } catch (e) { console.error("名簿ロードエラー:", e); }
    }

    // 管理パネルからの Broadcast 通信を受信
    const bc = new BroadcastChannel('splatoon3_tournament_sync');
    bc.onmessage = (event) => {
        if (event.data.type === 'TOURNAMENT_WIN') {
            const d = event.data; processResult(d.match.toUpperCase(), d.w || d.winner, d.winnerName, d.loserName);
        }
    };

    // ダブルエリミネーションの全自動ツリー判定＆表示切り替えロジック
    function processResult(match, side, wName, lName) {
        if (!tState[match]) return;
        tState[match].w = side;
        
        if(match === 'M1') {
            document.getElementById('box_M1').classList.add('w-win-active');
            ['line_M1_L','line_M1_H','line_M3_Go'].forEach(id => document.getElementById(id).classList.add('w-run'));
            tState.M3.t1 = wName; tState.M4.t1 = lName;
        }
        if(match === 'M2') {
            document.getElementById('box_M2').classList.add('w-win-active');
            ['line_M2_L','line_M2_H','line_M3_Go'].forEach(id => document.getElementById(id).classList.add('w-run'));
            tState.M3.t2 = wName; tState.M4.t2 = lName;
        }
        if(match === 'M3') {
            document.getElementById('box_M3').classList.add('w-win-active');
            ['line_M3_Up','line_M3_ToM6'].forEach(id => document.getElementById(id).classList.add('w-run'));
            
            // 💡【進行ルート修正】：③勝者側決勝の勝者は「⑥の上のマス」、敗者は「⑤の下のマス」へ送る
            tState.M6.t1 = wName; // ③の勝者 ➜ ⑥の上マス(M6_1)へ進出
            tState.M5.t2 = lName; // ③の敗者 ➜ ⑤の下マス(M5_2)へ転落
            
            // 💡【さらに修正】：③勝者側決勝の勝者は、同時に最上段の「⑥総合決勝」の勝者側(W)としてもセットしておく
            tState.M7.t1 = wName; 
        }
        if(match === 'M4') {
            document.getElementById('box_M4').classList.add('l-win-active');
            ['line_M4_Up','line_M4_ToM5','line_M5_Go'].forEach(id => document.getElementById(id).classList.add('l-run'));
            tState.M5.t1 = wName;
        }
        if(match === 'M5') {
            document.getElementById('box_M5').classList.add('l-win-active');
            ['line_M5_Up','line_M5_ToM6'].forEach(id => document.getElementById(id).classList.add('l-run'));
            tState.M6.t2 = wName;
        }
        if(match === 'M6') {
            document.getElementById('box_M6').classList.add('l-win-active');
            document.getElementById('line_M6_Up').classList.add('l-run');
            
            // 💡 敗者側決勝(⑥)の勝者は、最上段「⑥総合決勝」の敗者側(L)へセットされる
            tState.M7.t2 = wName;
        }
        if(match === 'M7') {
            // 🚨 決勝の結果（M7）が送信された瞬間のみ、最上段の表示・非表示を確定
            if (side === 'left') {
                // 勝者側(W)チームが勝った場合 ➜ 1発優勝のため、⑥の枠だけを真ん中に表示。⑦は非表示
                document.getElementById('box_M7').style.display = 'block';
                document.getElementById('box_M7').style.left = '860px'; // 中央固定
                document.getElementById('box_M7').classList.add('w-win-active');
                document.getElementById('box_M7_Reset').style.display = 'none'; // ⑦は非表示
            } else {
                // 敗者側(L)チームが勝った場合 ➜ ⑥を左にずらし、右側に⑦リセット戦枠を同時に出現させる
                document.getElementById('box_M7').style.display = 'block';
                document.getElementById('box_M7').style.left = '700px'; // 左にスライド
                document.getElementById('box_M7').classList.add('l-win-active');
                
                document.getElementById('box_M7_Reset').style.display = 'block'; // ⑦を表示
                tState.M7_Reset.t1 = wName; // 1試合目勝者（敗者側チーム）
                tState.M7_Reset.t2 = lName; // 1試合目敗者（勝者側チーム）
            }
        }
        if(match === 'M7_RESET') { document.getElementById('box_M7_Reset').classList.add('w-win-active'); }
        refreshDOM();
    }

    function refreshDOM() {
        const keys = ['M1','M2','M3','M4','M5','M6','M7'];
        keys.forEach(key => {
            const s1 = document.getElementById(`${key}_1`); const s2 = document.getElementById(`${key}_2`);
            s1.innerHTML = tState[key].t1 + (tState[key].w === 'right' ? ' <span class="lose-badge active">敗退</span>' : '');
            s2.innerHTML = tState[key].t2 + (tState[key].w === 'left' ? ' <span class="lose-badge active">敗退</span>' : '');
            if(tState[key].w) {
                document.getElementById(`${key}_${tState[key].w === 'left' ? '1' : '2'}`).className = `slot is-winner ${key==='M4'||key==='M5'||key==='M6'?'right-winner':'left-winner'}`;
            }
        });
        document.getElementById('M7R_1').innerHTML = tState.M7_Reset.t1 + (tState.M7_Reset.w === 'right' ? ' <span class="lose-badge active">敗退</span>' : '');
        document.getElementById('M7R_2').innerHTML = tState.M7_Reset.t2 + (tState.M7_Reset.w === 'left' ? ' <span class="lose-badge active">敗退</span>' : '');
        if(tState.M7_Reset.w) {
            document.getElementById(tState.M7_Reset.w === 'left' ? 'M7R_1' : 'M7R_2').className = 'slot is-winner left-winner';
        }
    }
    window.addEventListener('DOMContentLoaded', initTournament);
</script>
</body>
</html>
