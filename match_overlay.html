<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>スプラ3 大会オーバーレイ</title>
    <style>
        @import url('https://googleapis.com');
        body { margin: 0; padding: 0; width: 1920px; height: 1080px; overflow: hidden; background-color: transparent; font-family: 'Noto Sans JP', sans-serif; }
        .overlay-container { position: relative; width: 1920px; height: 1080px; }
        .team-area { position: absolute; bottom: 220px; width: 420px; display: flex; flex-direction: column; gap: 8px; }
        .team-area.left { left: 40px; }
        .team-area.right { right: 40px; text-align: right; }
        .team-ribbon { display: flex; align-items: center; justify-content: space-between; padding: 10px 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); transform: skewX(-12deg); border: 2px solid #fff; }
        .left .team-ribbon { background: linear-gradient(135deg, #12aa00, #24e000); border-radius: 8px 0 8px 0; }
        .right .team-ribbon { background: linear-gradient(135deg, #ff007f, #cc0066); border-radius: 0 8px 0 8px; flex-direction: row-reverse; }
        .team-name { font-size: 28px; color: #fff; text-shadow: 2px 2px 4px #000; transform: skewX(12deg); }
        .stars-box { display: flex; gap: 6px; transform: skewX(12deg); }
        .star { font-size: 24px; color: #444; }
        .star.active { color: #ffff00; text-shadow: 0 0 10px #ffff00, 2px 2px 2px #000; }
        .player-list { display: flex; flex-direction: column; gap: 5px; margin-top: 5px; }
        .player-card { background: rgba(15,15,15,0.85); border-left: 5px solid #fff; padding: 6px 15px; color: #fff; font-size: 22px; transform: skewX(-12deg); }
        .left .player-card { border-left-color: #24e000; text-align: left; }
        .right .player-card { border-left: none; border-right: 5px solid #ff007f; text-align: right; }
        .player-name { transform: skewX(12deg); display: inline-block; }
    </style>
</head>
<body>
    <div class="overlay-container">
        <div class="team-area left"><div class="team-ribbon"><div class="team-name" id="L_T">対戦チームA</div><div class="stars-box"><span class="star" id="L_S1">★</span><span class="star" id="L_S2">★</span></div></div><div class="player-list" id="L_P"></div></div>
        <div class="team-area right"><div class="team-ribbon"><div class="team-name" id="R_T">対戦チームB</div><div class="stars-box"><span class="star" id="R_S2">★</span><span class="star" id="R_S1">★</span></div></div><div class="player-list" id="R_P"></div></div>
    </div>
<script>
    const bc = new BroadcastChannel('splatoon3_tournament_sync');
    bc.onmessage = (e) => {
        const d = e.data;
        document.getElementById('L_T').innerText = d.L_Name;
        document.getElementById('R_T').innerText = d.R_Name;
        document.getElementById('L_S1').className = d.L_S >= 1 ? 'star active' : 'star';
        document.getElementById('L_S2').className = d.L_S >= 2 ? 'star active' : 'star';
        document.getElementById('R_S1').className = d.R_S >= 1 ? 'star active' : 'star';
        document.getElementById('R_Star2' in d ? 'R_Star2' : 'R_S2').className = d.R_S >= 2 ? 'star active' : 'star';
        
        document.getElementById('L_P').innerHTML = d.L_M.map(n => `<div class="player-card"><span class="player-name">${n}</span></div>`).join('');
        document.getElementById('R_P').innerHTML = d.R_M.map(n => `<div class="player-card"><span class="player-name">${n}</span></div>`).join('');
    };
</script>
</body>
</html>
